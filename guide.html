<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Guide - Animal Diagnosis & Treatment System</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Farmer Login</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p class="toggle-signup">Don't have an account? <a href="#signup">Sign up here</a></p>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">
                <h1>🐾 Animal Diagnosis & Remedies</h1>
                <p>Quick symptom diagnosis and treatment guidance for livestock</p>
            </div>
            <nav>
                <div class="dropdown">
                    <button class="dropdown-btn">☰ Menu</button>
                    <div class="dropdown-content">
                        <a href="home.html">Home</a>
                        <a href="diagnosis.html">Diagnosis</a>
                        <a href="guide.html">Disease Guide</a>
                    </div>
                </div>
                <ul>
                    <li><button id="loginBtn" class="nav-btn">Login</button></li>
                    <li><button id="logoutBtn" class="nav-btn hidden">Logout</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Disease Guide Section -->
        <section class="guide-section">
            <h2>Disease Reference Guide</h2>
            <p>Comprehensive information about common livestock diseases</p>

            <div class="guide-filter">
                <label>Filter by Animal Type:</label>
                <select id="guideAnimalFilter">
                    <option value="">All Animals</option>
                    <option value="cattle">Cattle</option>
                    <option value="sheep">Sheep</option>
                    <option value="goat">Goat</option>
                    <option value="pig">Pig</option>
                    <option value="poultry">Poultry</option>
                </select>
            </div>

            <div id="diseaseGuide" class="disease-guide-content"></div>
        </section>
    </main>

    <script src="js/shader-background.js"></script>
    <script src="js/api.js"></script>
    <script src="guide-script.js"></script>
    <script src="script.js"></script>
</body>

</html>
